<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ginger Registry</title>

<style>
:root {
  --bg: rgb(244, 244, 244);
  --text: #111;
  --card: rgb(255, 255, 255);
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0f0f0f;
    --text: #f5f5f5;
    --card: #1a1a1a;
  }
}

body {
  margin: 0;
  font-family: system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
}

header {
  background: #000;
  color: #fff;
  display: flex;
  align-items: center;
  padding: 12px 20px;
  padding-left: 250px;
}

header img {
  height: 32px;
  margin-right: 10px;
}

.container {
  max-width: 1000px;
  margin: 20px auto;
  padding: 0 16px;
}

.card {
  background: var(--card);
  border-radius: 4px;
  padding: 16px;
  margin-bottom: 16px;
  box-shadow: 0px 2px 1px -1px rgba(0, 0, 0, 0.2), 0px 1px 1px 0px rgba(0, 0, 0, 0.14), 0px 1px 3px 0px rgba(0, 0, 0, 0.12);;
}

.tag {
  font-weight: bold;
  font-size: 18px;
}

.meta {
  font-size: 14px;
  margin-top: 6px;
  opacity: 0.8;
}

.layer {
  font-family: monospace;
  font-size: 13px;
  margin: 6px 0;
  word-break: break-all;
}

.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 6px;
  background: #444;
  color: #fff;
  font-size: 12px;
  margin-left: 6px;
}
</style>
</head>

<body>

<header>
  <img src="https://www.gingersociety.org/img/ginger_icon.png">
  <strong>Ginger Artifactory</strong>
</header>

<div class="container">
  <h1 id="repoName">Loading...</h1>
  <div id="content"></div>
</div>

</body>
</html>
